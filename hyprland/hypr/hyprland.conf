monitor=eDP-1,1920x1080@144,0x0,1

exec-once = nm-applet
exec-once = hyprpaper -c $HOME/.config/hypr/hyprpaper.conf
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = mako

$terminal = kitty -e fish
$menu = wofi --show drun
$mainMod = SUPER

  decoration {
      # screen_shader = ~/.config/hypr/shaders/crt.glsl
  }

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = NNN_COLORS,#060d0b07
env = NNN_FCOLORS,080b04020005060701030d09

input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

cursor {
    no_hardware_cursors = true
}

input {
    touchpad {
        disable_while_typing = false
    }
}

animations {
    enabled = true
    bezier = myBezier,0,1,0.18,1.0

    animation = windows,1,1.5,myBezier
    animation = windowsOut,1,2,myBezier,popin 95%
    animation = border,1,12,myBezier
    animation = borderangle,1,5,default
    animation = fade,1,6,default
    animation = workspaces,1,6,default
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1

    col.active_border = rgb(18,18,18)
    col.inactive_border = rgb(18,18,18)

    resize_on_border = true
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 12
    active_opacity = 0.90
    inactive_opacity = 0.65

    shadow {
        enabled = true
        range = 16
        render_power = 5
        color = rgba(0,0,0,0.35)
    }

    blur {
        enabled = true
        size = 2
        passes = 3
        vibrancy = 0.1696
        ignore_opacity = true
        popups = true
        popups_ignorealpha = 0.01
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# --- KEYBINDS ---

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, D, exec, $menu

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod SHIFT, SPACE, togglefloating
bind = $mainMod, F, fullscreen

# Screenshot
bind = ,Print, exec, grim - | tee ~/Pictures/Screenshots/screen-$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy
bind = SHIFT,Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/drag-$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume / Brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# --- FLOATING NNN (TOP LEFT) ---

bind = $mainMod, E, exec, kitty -e nnn
# --- LAYER BLUR (NEW SYNTAX) ---

layerrule = match:namespace ^(wofi)$, blur 1
layerrule = match:namespace ^(waybar)$, blur 1
layerrule = match:namespace ^(eww)$, blur 1
